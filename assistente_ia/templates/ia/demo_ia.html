<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Demo - IA Text-to-SQL</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; padding: 40px; max-width: 800px; margin: 0 auto; }
        .card { background-color: #2d2d2d; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px;}
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #444; background: #121212; color: #fff; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;}
        button:hover { background-color: #45a049; }
        pre { background: #000; padding: 15px; border-radius: 4px; overflow-x: auto; color: #00ff00; }
        .log-area { margin-top: 20px; }
        
        /* Novo estilo para o input desabilitado / Automático */
        input[readonly] { background-color: #333; color: #888; cursor: not-allowed; border-color: #555; }
        .alerta-erro { color: #ff4444; font-size: 13px; font-weight: bold; display: block; margin-top: -5px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>🤖 Assistente de Vendas com IA</h2>
    <p>Consulte o banco de dados da academia usando linguagem natural.</p>

    <div class="card">
        <label>🔑 Token JWT do Admin (Gerado Automático):</label>
        
        <!-- O Django vai trocar esse {{ token_automatico }} pela string na hora de carregar -->
        <input type="text" id="jwtToken" value="{{ token_automatico }}" readonly>
        
        <!-- Aviso de erro caso o admin@admin.com não seja encontrado -->
        {% if erro_demo %}
            <span class="alerta-erro">⚠️ {{ erro_demo }}</span>
        {% endif %}
        
        <label>💬 Sua Pergunta:</label>
        <input type="text" id="perguntaInput" placeholder="Ex: Quantas categorias temos cadastradas?">
        
        <button onclick="fazerPergunta()">Consultar Banco de Dados</button>
    </div>

    <div class="card log-area">
        <h3>📊 Resultado:</h3>
        <pre id="resultadoJson">Aguardando pergunta...</pre>
    </div>

    <script>
        async function fazerPergunta() {
            const token = document.getElementById('jwtToken').value;
            const pergunta = document.getElementById('perguntaInput').value;
            const divResultado = document.getElementById('resultadoJson');

            if (!token) {
                divResultado.innerText = "❌ Erro: O Token JWT automático não foi gerado! Crie o usuário admin@admin.com no banco de dados.";
                return;
            }
            if (!pergunta) {
                divResultado.innerText = "❌ Erro: Digite uma pergunta!";
                return;
            }

            divResultado.innerText = "Processando com Inteligência Artificial...\nExecutando consulta no banco de dados...";

            try {
                // Usando a URL que você definiu
                const response = await fetch('/api/assistente-ia/consultar/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ pergunta: pergunta })
                });

                const data = await response.json();
                
                // Formata o JSON para ficar bonito na tela
                divResultado.innerText = JSON.stringify(data, null, 4);

            } catch (error) {
                divResultado.innerText = "❌ Falha na conexão: " + error.message;
            }
        }
    </script>
</body>
</html>
